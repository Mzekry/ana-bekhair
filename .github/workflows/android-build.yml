name: Android Build (Capacitor)

# Packages the app as a Capacitor WebView APK:
#   1. expo export --platform web  -> static dist/ (flat, index.html at root)
#   2. cap sync android            -> copies dist/ into the Android project
#   3. gradlew assembleDebug       -> installable APK (debug-signed)
#
# No native Expo/RN compilation, no SSR, no build-time env vars.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "artifacts/tammen-app/**"
      - ".github/workflows/android-build.yml"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/tammen-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node 20 + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: corepack enable
        working-directory: .

      - name: Install dependencies
        run: pnpm install
        working-directory: .

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build static web export
        run: pnpm run build

      - name: Sync web assets into Android (Capacitor)
        run: pnpm exec cap sync android

      - name: Gradle assembleDebug (installable APK)
        working-directory: artifacts/tammen-app/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ana-bekhair-capacitor-apk
          path: artifacts/tammen-app/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
